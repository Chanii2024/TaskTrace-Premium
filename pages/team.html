<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskTrace | Team Members</title>

    <!-- Primary Meta Tags -->
    <meta name="title" content="TaskTrace | Professional Project Tracking">
    <meta name="description"
        content="A premium real-time project management dashboard with a modern glassmorphism design. Track tasks and manage teams with ease.">
    <meta name="theme-color" content="#030712">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="../images/logo.svg">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Firebase SDK (Compat Version) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <!-- Custom Styles -->
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="min-h-screen overflow-x-hidden">

    <!-- Shared components injected via common.js -->


    <div class="relative w-full overflow-hidden pt-32">
        <!-- Member Selection View -->
        <div id="member-view" class="view-transition view-visible flex flex-col items-center min-h-[50vh] p-6 pb-20">
            <!-- Top Navigation Row -->
            <div
                class="w-full max-w-[1400px] xl:max-w-7xl mx-auto mb-12 flex justify-between items-center px-4 sm:px-6">
                <button onclick="backToProjects()"
                    class="group flex items-center space-x-3 px-6 py-3 bg-white/5 hover:bg-white/10 rounded-2xl border border-white/5 transition-all">
                    <i data-lucide="arrow-left" class="w-4 h-4 group-hover:-translate-x-1 transition-transform"></i>
                    <span class="text-[10px] font-black uppercase tracking-widest">Back to Projects</span>
                </button>

                <!-- Sprint Analytics Toggle -->
                <button onclick="goToAnalytics()"
                    class="group flex items-center space-x-3 px-6 py-3 bg-emerald-500/5 hover:bg-emerald-500/10 rounded-2xl border border-emerald-500/10 transition-all duration-300">
                    <span class="relative flex h-2 w-2">
                        <span
                            class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                    </span>
                    <i data-lucide="bar-chart-2" class="w-4 h-4 text-emerald-500/80"></i>
                    <span class="text-[9px] font-black uppercase tracking-[0.2em] text-emerald-500/80">Sprint
                        Analytics</span>
                </button>
            </div>

            <!-- Page Header + Actions Row -->
            <div
                class="w-full max-w-[1400px] xl:max-w-7xl mx-auto flex flex-col lg:flex-row lg:items-end justify-between mb-12 px-4 sm:px-6 gap-8">
                <div class="text-left">
                    <h2 class="text-5xl font-black tracking-tighter mb-2" id="selected-project-title">Loading...</h2>
                    <p class="text-gray-500 font-medium italic">Select a team member to access their workspace</p>
                </div>

                <!-- Page Actions Area -->
                <div class="flex flex-wrap items-center lg:justify-end gap-3">
                    <button onclick="selectMember('Global', 'Global Overview')"
                        class="group flex items-center space-x-3 px-5 py-3.5 bg-white/5 hover:bg-white/10 rounded-2xl border border-white/10 transition-all duration-300">
                        <i data-lucide="layout-grid"
                            class="w-4 h-4 text-gray-500 group-hover:text-white transition-colors"></i>
                        <span class="font-black uppercase tracking-widest text-[9px]">Global View</span>
                    </button>
                    <div class="hidden sm:block w-px h-8 bg-white/10 mx-1"></div>

                    <!-- Sprint Selector removed -->

                    <!-- Add Sprint Button -->
                    <button onclick="openGenericModal('sprint')"
                        class="group flex items-center space-x-3 px-5 py-3.5 bg-cyan-500/10 hover:bg-cyan-500/20 rounded-2xl border border-cyan-500/20 transition-all duration-300 md:mr-1">
                        <i data-lucide="plus"
                            class="w-4 h-4 text-cyan-400 group-hover:rotate-90 transition-transform duration-500"></i>
                        <span class="font-black uppercase tracking-widest text-[9px] text-cyan-400">Add Sprint</span>
                    </button>
                    <button onclick="openGenericModal('member')"
                        class="group flex items-center space-x-3 px-5 py-3.5 bg-white/5 hover:bg-white/10 rounded-2xl border border-white/10 transition-all duration-300">
                        <div
                            class="w-5 h-5 rounded-lg bg-cyan-500/10 flex items-center justify-center text-cyan-500 group-hover:scale-110 transition-transform">
                            <i data-lucide="user-plus" class="w-3.5 h-3.5"></i>
                        </div>
                        <span class="font-black uppercase tracking-widest text-[9px]">Add Member</span>
                    </button>
                    <button onclick="openGenericModal('task')"
                        class="group flex items-center space-x-4 px-8 py-3.5 bg-accent-purple hover:bg-purple-600 rounded-2xl transition-all duration-300 shadow-xl shadow-purple-500/20">
                        <i data-lucide="plus" class="w-4 h-4 text-white"></i>
                        <span class="font-black uppercase tracking-widest text-[9px]">Add Mission</span>
                    </button>
                </div>
            </div>

            <div id="member-grid"
                class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 w-full max-w-[1400px] xl:max-w-7xl mx-auto px-4 sm:px-6 items-stretch mb-20">
                <!-- Members injected here -->
            </div>

            <!-- Scripts -->
            <script src="../js/firebase-app.js"></script>
            <script src="../js/common.js"></script>
            <script src="../js/members.js"></script>
</body>

</html>
